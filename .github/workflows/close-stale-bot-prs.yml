name: Close stale bot PRs

# Ported from ~/Code/bun/.github/workflows/close-stale-robobun-prs.yml at SHA
# fd0b6f1a271fca0b8124b69f230b100f4d636af6. Home pin: 2026-05-17.
# See docs/TS_PARITY_PLAN.md §12.18.a for the porting plan.
#
# Once per day, closes buddy-bot dependency-update PRs older than 90
# days. Buddy-bot already rebases and re-opens fresh PRs on the latest
# upstream, so old PRs are noise.

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  close-stale-bot-prs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - name: Close stale buddy-bot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ninety_days_ago=$(date -u -d '90 days ago' +%Y-%m-%dT%H:%M:%SZ)

          gh pr list \
            --author buddy-bot \
            --state open \
            --json number,updatedAt \
            --limit 1000 \
            --jq ".[] | select(.updatedAt < \"$ninety_days_ago\") | .number" |
          while read -r pr_number; do
            echo "Closing PR #$pr_number (last updated before $ninety_days_ago)"
            gh pr close "$pr_number" --comment "Closing this PR because it has been inactive for more than 90 days."
          done
