name: TS Conformance Delta Gate

# Per-PR gate that fails if any tracked parity row regresses below the
# snapshot in .github/conformance-baseline.json. Tracked rows:
#
#   - `smoke` / `category` / `baseline-aware`: per-folder pass counts
#     parsed from the conformance-suite output. Total may grow (new
#     tests added), but `passed` per row must be monotonic.
#   - `diagnostic-codes`: parity-ratchet count of upstream TS diagnostic
#     codes the Home compiler emits in production source. Parsed from
#     `docs/TS_DIAGNOSTIC_CODE_STATUS.md` (regenerated each run by
#     `scripts/gen-ts-diagnostic-status.mjs`). Every `feat(ts-parity):
#     implement TSxxxx` commit moves the `emitted` row by +1; this gate
#     catches PRs that drop the count.
#
# Together these complement the umbrella `test-count-gate` in ci.yml
# (which only watches the global pass count) by catching swaps where a
# row grows while another shrinks.
#
# Regenerate the baseline (intentional bumps only) with:
#   ./tools/ts_parity_snapshot.py generate \
#       --out .github/conformance-baseline.json
# Commit the new JSON in the same PR so the bump is reviewable.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  conformance-delta:
    name: TS conformance per-category delta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Match the Pantry-pinned Zig version from package.json/pantry.lock.
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.17.0-dev.1441+d5181a9c9'

      - name: Verify Zig installation
        run: zig version

      # Capture the full log to disk so we can both gate on it and upload
      # it as an artifact for postmortem when the gate fails.
      - name: Run ts_conformance suite
        run: |
          set -o pipefail
          # The Zig test runner exits non-zero whenever any case fails;
          # the gate script is what decides whether the run is a regression,
          # so swallow the exit here and let the script speak.
          zig build test -Dfilter=ts_conformance 2>&1 | tee conformance-run.log || true

      # The diagnostic-codes row in the snapshot is parsed from the
      # generated ledger. Regen against HEAD so the gate compares
      # current production source's emission count to the baseline,
      # not whatever was checked in. Drift between checked-in and
      # regenerated ledger triggers the `--check-ledger` flag below.
      - name: Regenerate TS diagnostic-code ledger
        run: |
          # Node is preinstalled on ubuntu-latest runners.
          node scripts/gen-ts-diagnostic-status.mjs

      - name: Compare against baseline
        run: |
          python3 tools/ts_parity_snapshot.py compare \
            --baseline .github/conformance-baseline.json \
            --from-log conformance-run.log \
            --write-current conformance-current.json

      - name: Upload conformance run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-conformance-delta-${{ github.run_id }}
          path: |
            conformance-run.log
            conformance-current.json
          if-no-files-found: ignore
          retention-days: 14
