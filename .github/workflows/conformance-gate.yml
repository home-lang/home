name: TS Conformance Delta Gate

# Per-PR gate that fails if any per-category passing-test count drops below
# the snapshot in .github/conformance-baseline.json. Total may grow (we add
# tests), but `passed` per row must be monotonic across PRs. This complements
# the umbrella `test-count-gate` in ci.yml, which only watches the global
# pass count and would miss a category swap (e.g. +5 here, -5 there).
#
# Regenerate the baseline (intentional bumps only) with:
#   ./tools/ts_parity_snapshot.py generate \
#       --out .github/conformance-baseline.json
# Commit the new JSON in the same PR so the bump is reviewable.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  conformance-delta:
    name: TS conformance per-category delta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Match the Zig version every other workflow pins to. The Pantry
      # toolchain in pantry/.bin is local-dev convenience; CI uses
      # mlugg/setup-zig so the runner gets a known-good prebuilt.
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.17.0-dev.56+a8226cd53'

      - name: Verify Zig installation
        run: zig version

      # Capture the full log to disk so we can both gate on it and upload
      # it as an artifact for postmortem when the gate fails.
      - name: Run ts_conformance suite
        run: |
          set -o pipefail
          # The Zig test runner exits non-zero whenever any case fails;
          # the gate script is what decides whether the run is a regression,
          # so swallow the exit here and let the script speak.
          zig build test -Dfilter=ts_conformance 2>&1 | tee conformance-run.log || true

      - name: Compare against baseline
        run: |
          python3 tools/ts_parity_snapshot.py compare \
            --baseline .github/conformance-baseline.json \
            --from-log conformance-run.log \
            --write-current conformance-current.json

      - name: Upload conformance run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-conformance-delta-${{ github.run_id }}
          path: |
            conformance-run.log
            conformance-current.json
          if-no-files-found: ignore
          retention-days: 14
