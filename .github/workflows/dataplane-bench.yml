name: Dataplane Benchmark

# Builds the native reverse-proxy dataplane with the pinned Zig 0.17-dev toolchain
# and benchmarks it against nginx on the HTML (body-bound) workload — the metric
# where a runtime/JS proxy is ~3x behind nginx, and where splice() should let the
# dataplane match or beat it. Runs on Linux (the dataplane's splice path is
# Linux-only). Results are written to the job summary.

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages/dataplane/**'
      - '.github/workflows/dataplane-bench.yml'

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.17.0-dev.1441+d5181a9c9'

      - name: Verify Zig
        run: zig version

      - name: Install nginx, jq, oha
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx jq
          curl -fsSL https://github.com/hatoo/oha/releases/download/v1.4.0/oha-linux-amd64 -o oha \
            || cargo install oha --locked
          if [ -f oha ]; then chmod +x oha && sudo mv oha /usr/local/bin/oha; fi
          oha --version

      - name: Build dataplane (ReleaseFast)
        working-directory: packages/dataplane
        run: zig build -Doptimize=ReleaseFast

      - name: Diagnose io_uring engine (trace a few requests)
        working-directory: packages/dataplane
        run: |
          set -x
          bun -e 'Bun.serve({port:8591,hostname:"127.0.0.1",fetch(){return new Response("hello from origin\n")}})' &
          ORIGIN=$!
          sleep 1
          ./zig-out/bin/dataplane 8590 127.0.0.1 8591 uring debug 2>uring.trace &
          DP=$!
          sleep 1
          echo "--- curl 1 ---"; curl -sS --max-time 5 http://127.0.0.1:8590/ || echo "CURL FAILED"
          echo "--- curl 2 ---"; curl -sS --max-time 5 http://127.0.0.1:8590/ || echo "CURL FAILED"
          sleep 1
          kill $DP $ORIGIN 2>/dev/null || true
          echo "===== io_uring trace ====="
          cat uring.trace

      - name: Benchmark vs nginx (HTML)
        working-directory: packages/dataplane
        run: bash bench/run.sh | tee -a "$GITHUB_STEP_SUMMARY"
