name: Close inactive issues

# Ported from ~/Code/bun/.github/workflows/stale.yaml at SHA
# fd0b6f1a271fca0b8124b69f230b100f4d636af6. Home pin: 2026-05-17.
# See docs/TS_PARITY_PLAN.md §12.18.a for the porting plan.
#
# Replaces the older probot/stale config at .github/stale.yml — the
# actions/stale workflow is the supported path and lets us pin a
# specific actions/stale SHA rather than depending on the probot app's
# rolling deployment.

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@f7176fd3007623b69d27091f9b9d4ab7995f0a06 # v5
        with:
          days-before-issue-close: 5
          any-of-issue-labels: "needs repro,waiting-for-author"
          exempt-issue-labels: "neverstale,pinned,security,no-stale,pr welcome"
          exempt-pr-labels: "neverstale,pinned,security,no-stale"
          remove-stale-when-updated: true
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: "This issue is stale and may be closed due to inactivity. If you're still running into this, please leave a comment."
          close-issue-message: "This issue was closed because it has been inactive for 5 days since being marked as stale."
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-message: "This pull request is stale and may be closed due to inactivity."
          close-pr-message: "This pull request has been closed due to inactivity."
          repo-token: ${{ github.token }}
          operations-per-run: 1000
